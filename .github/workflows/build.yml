name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm PDREADF.spec

      - name: Verify executable exists
        run: |
          if (!(Test-Path "dist\PDREADF.exe")) {
            Write-Error "PDREADF.exe was not produced"
            exit 1
          }
          $size = (Get-Item "dist\PDREADF.exe").Length / 1MB
          Write-Host "PDREADF.exe size: $([math]::Round($size, 2)) MB"

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: PDREADF-portable
          path: dist/PDREADF.exe
          retention-days: 90

  installer:
    name: Build Windows Installer
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download portable executable
        uses: actions/download-artifact@v4.3.0
        with:
          name: PDREADF-portable
          path: dist

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PDREADF-installer
          path: installer_output/Setup_PDREADF_*.exe
          retention-days: 90

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, installer]
    runs-on: ubuntu-latest
    steps:
      - name: Download portable executable
        uses: actions/download-artifact@v4.3.0
        with:
          name: PDREADF-portable
          path: artifacts

      - name: Download installer
        uses: actions/download-artifact@v4.3.0
        with:
          name: PDREADF-installer
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/PDREADF.exe
            artifacts/Setup_PDREADF_*.exe
